name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write # required for GitHub Packages publishing
  id-token: write # required for trusted publishing

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify versions match tag
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract versions
        id: versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Allow tags like v1.2.3 or 1.2.3
          TAG_NO_V=${TAG#v}
          echo "tag=${TAG_NO_V}" >> "$GITHUB_OUTPUT"

          # package.json version via Node (works regardless of type: module)
          PKG_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "npm=${PKG_VER}" >> "$GITHUB_OUTPUT"

          # version.rb version
          GEM_VER=$(sed -n 's/^[[:space:]]*VERSION[[:space:]]*=[[:space:]]*"\(.*\)"[[:space:]]*$/\1/p' lib/skyltmax_config/version.rb)
          echo "gem=${GEM_VER}" >> "$GITHUB_OUTPUT"

          echo "Tag:        $TAG_NO_V"
          echo "npm:        $PKG_VER"
          echo "RubyGems:   $GEM_VER"

          if [[ "$PKG_VER" != "$TAG_NO_V" || "$GEM_VER" != "$TAG_NO_V" ]]; then
            echo "Version mismatch: tag=$TAG_NO_V, npm=$PKG_VER, gem=$GEM_VER" >&2
            exit 1
          fi
  publish_npm:
    name: Publish npm package
    needs: verify
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish package
        run: npm publish
  publish_npm_canary:
    name: Publish npm canary
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Set canary version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting canary version: $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version
      - name: Publish canary
        run: npm publish --tag canary
  publish_gem:
    name: Publish Ruby gem
    needs: verify
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby
      - name: Build gem package
        run: |
          rm -f skyltmax_config-*.gem
          gem build skyltmax_config.gemspec
      - name: Configure trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Publish gem
        run: |
          GEM_FILE=$(ls -t skyltmax_config-*.gem 2>/dev/null | head -n 1 || true)
          if [ -z "$GEM_FILE" ]; then
            echo "Gem file not found" >&2
            exit 1
          fi

          gem push "$GEM_FILE"
  publish_gem_prerelease:
    name: Publish prerelease gem
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false
          ruby-version: ruby
      - name: Install dependencies
        run: bundle install
      - name: Set prerelease version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Ruby gem versions use dots instead of hyphens (e.g. 0.0.12.beta.1)
          GEM_VERSION="${TAG_VERSION//-/.}"

          echo "Setting prerelease version: $GEM_VERSION"
          sed -i "s/VERSION = \".*\"/VERSION = \"${GEM_VERSION}\"/" lib/skyltmax_config/version.rb
          cat lib/skyltmax_config/version.rb
      - name: Update Gemfile.lock
        run: bundle install
      - name: Build prerelease gem package
        run: |
          rm -f skyltmax_config-*.gem
          gem build skyltmax_config.gemspec
      - name: Configure trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Publish prerelease gem
        run: |
          GEM_FILE=$(ls -t skyltmax_config-*.gem 2>/dev/null | head -n 1 || true)
          if [ -z "$GEM_FILE" ]; then
            echo "Gem file not found" >&2
            exit 1
          fi

          gem push "$GEM_FILE"
